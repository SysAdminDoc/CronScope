const { useState, useEffect, useMemo, useCallback, useRef } = React;

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const FIELD_NAMES = ["Minute","Hour","Day of Month","Month","Day of Week"];
const PRESETS = [
  { label: "Every minute", expr: "* * * * *" },

const EC = ["#06b6d4","#f59e0b","#a78bfa","#f43f5e","#10b981","#fb923c"];

function parseCronField(field, min, max) {
  const values = new Set();
  for (const part of field.split(",")) {
    if (part === "*") { for (let i = min; i <= max; i++) values.add(i); }
    else if (part.includes("/")) {
      const [range, stepStr] = part.split("/");
      const step = parseInt(stepStr, 10);
      if (isNaN(step) || step <= 0) return null;
      let start = min, end = max;
      if (range !== "*") {
        if (range.includes("-")) { const [a, b] = range.split("-").map(Number); start = a; end = b; }
        else start = parseInt(range, 10);
      }
      if (isNaN(start) || isNaN(end)) return null;
      for (let i = start; i <= end; i += step) values.add(i);
    } else if (part.includes("-")) {
      const [a, b] = part.split("-").map(Number);
      if (isNaN(a) || isNaN(b)) return null;
      for (let i = a; i <= b; i++) values.add(i);
    } else {
      const v = parseInt(part, 10);
      if (isNaN(v)) return null;
      values.add(v);
    }
  }
  for (const v of values) if (v < min || v > max) return null;
  return values;
}

function parseCron(expr) {
  const parts = expr.trim().split(/\s+/);
  if (parts.length !== 5) return null;
  const minutes = parseCronField(parts[0], 0, 59);
  const hours = parseCronField(parts[1], 0, 23);
  const doms = parseCronField(parts[2], 1, 31);
  const months = parseCronField(parts[3], 1, 12);
  let dows = parseCronField(parts[4], 0, 7);
  if (!minutes || !hours || !doms || !months || !dows) return null;
  if (dows.has(7)) { dows.add(0); dows.delete(7); }
  return { minutes, hours, doms, months, dows, domWild: parts[2] === "*", dowWild: parts[4] === "*" };
}

function getFireTimes(parsed, year, maxResults = 5000) {
  const results = [];
  const { minutes, hours, doms, months, dows, domWild, dowWild } = parsed;
  for (const month of [...months].sort((a,b)=>a-b)) {
    const dim = new Date(year, month, 0).getDate();
    for (let day = 1; day <= dim; day++) {
      if (!doms.has(day)) continue;
      const date = new Date(year, month-1, day);
      const dow = date.getDay();
      if (!domWild && !dowWild) { if (!doms.has(day) && !dows.has(dow)) continue; }
      else if (!dowWild) { if (!dows.has(dow)) continue; }
      for (const hour of [...hours].sort((a,b)=>a-b)) {
        for (const minute of [...minutes].sort((a,b)=>a-b)) {
          results.push(new Date(year, month-1, day, hour, minute));
          if (results.length >= maxResults) return results;
        }
      }
    }
  }
  return results;
}

function describeCron(expr) {
  const parts = expr.trim().split(/\s+/);
  if (parts.length !== 5) return "Invalid expression";
  const [min,hr,dom,mon,dow] = parts;
  const pieces = [];
  if (min==="*"&&hr==="*") pieces.push("Every minute");
  else if (min.startsWith("*/")) pieces.push("Every "+min.slice(2)+" minutes");
  else if (hr==="*"&&min!=="*") pieces.push("At minute "+min+" of every hour");
  else if (min!=="*"&&hr!=="*") {
    const hrs = hr.includes(",")?hr.split(","):[hr];
    const mins = min.padStart(2,"0");
    if (hrs.length===1&&!hr.includes("-")&&!hr.includes("/")) pieces.push("At "+hr.padStart(2,"0")+":"+mins);
    else pieces.push("At minute "+min+", during hour(s) "+hr);
  } else if (hr.startsWith("*/")) pieces.push("At minute "+(min==="*"?"0":min)+", every "+hr.slice(2)+" hours");
  else pieces.push("At minute "+min+", hour "+hr);
  if (dom!=="*") pieces.push("on day "+dom+" of the month");
  if (mon!=="*") {
    const mNames = mon.split(",").map(m=>{const n=parseInt(m,10);return isNaN(n)?m:(MONTHS[n-1]||m);});
    pieces.push("in "+mNames.join(", "));
  }
  if (dow!=="*") {
    const dMap={"0":"Sun","1":"Mon","2":"Tue","3":"Wed","4":"Thu","5":"Fri","6":"Sat","7":"Sun"};
    const dNames = dow.split(",").map(d=>{
      if(d.includes("-")){const[a,b]=d.split("-");return (dMap[a]||a)+"-"+(dMap[b]||b);}
      return dMap[d]||d;
    });
    pieces.push("on "+dNames.join(", "));
  }
  return pieces.join(" ");
}

function getDayCounts(fireTimes) {
  const counts = {};
  for (const t of fireTimes) { const k=t.getMonth()+"-"+t.getDate(); counts[k]=(counts[k]||0)+1; }
  return counts;
}

function HeatCell({count,maxCount,color,isToday,tooltip,onClick}) {
  const intensity = count===0?0:Math.max(0.15,Math.min(1,count/Math.max(maxCount,1)));
  const bg = count===0?"transparent":color+Math.round(intensity*200).toString(16).padStart(2,"0");
  const border = isToday?"1px solid "+C.accent:count>0?"1px solid "+color+"22":"1px solid transparent";
  const ref = useRef(null);
  return React.createElement("div",{
    ref, onClick, title:tooltip,
    style:{width:13,height:13,backgroundColor:bg,border,borderRadius:2,cursor:count>0?"pointer":"default",transition:"all 0.15s",position:"relative"},
    onMouseEnter:()=>{if(count>0&&ref.current){ref.current.style.transform="scale(1.4)";ref.current.style.zIndex="10";}},
    onMouseLeave:()=>{if(ref.current){ref.current.style.transform="scale(1)";ref.current.style.zIndex="1";}},
  });
}

function CalendarHeatmap({expressions,year,onDayClick}) {
  const today = new Date();
  const isCurrentYear = today.getFullYear()===year;
  const allData = useMemo(()=>expressions.filter(e=>e.parsed).map((e,i)=>({
    counts:getDayCounts(getFireTimes(e.parsed,year)),color:EC[i%EC.length],
  })),[expressions,year]);
  const mergedMax = useMemo(()=>{let m=0;for(const d of allData)for(const v of Object.values(d.counts))if(v>m)m=v;return m;},[allData]);

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6}},
    MONTHS.map((mName,mIdx)=>{
      const dim=new Date(year,mIdx+1,0).getDate();
      const firstDow=new Date(year,mIdx,1).getDay();
      const weeks=[];let week=new Array(firstDow).fill(null);
      for(let d=1;d<=dim;d++){week.push(d);if(week.length===7){weeks.push(week);week=[];}}
      if(week.length>0){while(week.length<7)week.push(null);weeks.push(week);}
      return React.createElement("div",{key:mIdx,style:{display:"flex",alignItems:"flex-start",gap:8}},
        React.createElement("div",{style:{width:32,fontSize:11,color:C.textDim,fontFamily:"'JetBrains Mono',monospace",paddingTop:2,textAlign:"right",flexShrink:0}},mName),
        React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:1}},
          weeks.map((w,wi)=>React.createElement("div",{key:wi,style:{display:"flex",gap:1}},
            w.map((day,di)=>{
              if(day===null) return React.createElement("div",{key:di,style:{width:13,height:13}});
              const key=mIdx+"-"+day;
              const isTodayCell=isCurrentYear&&today.getMonth()===mIdx&&today.getDate()===day;
              const totalCount=allData.reduce((s,d)=>s+(d.counts[key]||0),0);
              const domIdx=allData.reduce((best,d,i)=>{const c=d.counts[key]||0;return c>(best.count||0)?{idx:i,count:c}:best;},{idx:0,count:0}).idx;
              const color=allData.length>0?allData[domIdx].color:C.accent;
              return React.createElement(HeatCell,{key:di,count:totalCount,maxCount:mergedMax,color,isToday:isTodayCell,
                tooltip:mName+" "+day+": "+totalCount+" execution"+(totalCount!==1?"s":""),
                onClick:()=>totalCount>0&&onDayClick&&onDayClick(year,mIdx,day)});
            })
          ))
        )
      );
    })
  );
}

function DayDetail({year,month,day,expressions,onClose}) {
  const date=new Date(year,month,day);
  const dayName=DAYS[date.getDay()];
  const details=expressions.filter(e=>e.parsed).map((e,i)=>{
    const times=getFireTimes(e.parsed,year).filter(t=>t.getMonth()===month&&t.getDate()===day);
    return {expr:e,color:EC[i%EC.length],times,index:i};
  }).filter(d=>d.times.length>0);

  return React.createElement("div",{style:{background:C.surfaceAlt,border:"1px solid "+C.border,borderRadius:10,padding:16,marginTop:12,animation:"slideIn 0.2s ease"}},
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      React.createElement("div",{style:{fontSize:14,fontWeight:600,color:C.text,fontFamily:"'JetBrains Mono',monospace"}},dayName+", "+MONTHS[month]+" "+day+", "+year),
      React.createElement("button",{onClick:onClose,style:{background:"none",border:"none",color:C.textDim,cursor:"pointer",fontSize:18,lineHeight:1,padding:"2px 6px"}},"\u00d7")
    ),
    details.map((d,i)=>React.createElement("div",{key:i,style:{marginBottom:i<details.length-1?10:0}},
      React.createElement("div",{style:{fontSize:11,color:d.color,fontFamily:"'JetBrains Mono',monospace",marginBottom:4,display:"flex",alignItems:"center",gap:6}},
        React.createElement("span",{style:{width:8,height:8,borderRadius:"50%",background:d.color,flexShrink:0}}),
        (d.expr.label||d.expr.value)+" \u2014 "+d.times.length+" run"+(d.times.length!==1?"s":"")
      ),
      React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:4,paddingLeft:14}},
        d.times.slice(0,48).map((t,j)=>React.createElement("span",{key:j,style:{fontSize:10,color:C.textDim,background:d.color+"15",padding:"2px 6px",borderRadius:4,fontFamily:"'JetBrains Mono',monospace"}},
          String(t.getHours()).padStart(2,"0")+":"+String(t.getMinutes()).padStart(2,"0")
        )),
        d.times.length>48?React.createElement("span",{style:{fontSize:10,color:C.textMuted}},"+"+( d.times.length-48)+" more"):null
      )
    ))
  );
}

function StatsPanel({expressions,year}) {
  const stats=useMemo(()=>expressions.filter(e=>e.parsed).map((e,i)=>{
    const times=getFireTimes(e.parsed,year);
    const dayCounts=getDayCounts(times);
    const activeDays=Object.keys(dayCounts).length;
    const maxPerDay=Math.max(0,...Object.values(dayCounts));
    const hourDist=new Array(24).fill(0);const dowDist=new Array(7).fill(0);
    for(const t of times){hourDist[t.getHours()]++;dowDist[t.getDay()]++;}
    return {label:e.label||e.value,color:EC[i%EC.length],total:times.length,activeDays,maxPerDay,
      peakHour:hourDist.indexOf(Math.max(...hourDist)),peakDow:dowDist.indexOf(Math.max(...dowDist)),
      avgPerDay:activeDays>0?(times.length/activeDays).toFixed(1):"0"};
  }),[expressions,year]);
  if(stats.length===0) return null;

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
    stats.map((s,i)=>React.createElement("div",{key:i,style:{background:C.surfaceAlt,border:"1px solid "+C.border,borderRadius:10,padding:14}},
      React.createElement("div",{style:{fontSize:11,color:s.color,fontFamily:"'JetBrains Mono',monospace",marginBottom:10,display:"flex",alignItems:"center",gap:6,borderBottom:"1px solid "+C.border,paddingBottom:8}},
        React.createElement("span",{style:{width:8,height:8,borderRadius:"50%",background:s.color,flexShrink:0}}),s.label
      ),
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
        [{l:"Total runs/yr",v:s.total.toLocaleString()},{l:"Active days",v:s.activeDays},{l:"Max/day",v:s.maxPerDay},{l:"Avg/active day",v:s.avgPerDay},{l:"Peak hour",v:String(s.peakHour).padStart(2,"0")+":00"},{l:"Peak day",v:DAYS[s.peakDow]}].map((item,j)=>
          React.createElement("div",{key:j},
            React.createElement("div",{style:{fontSize:9,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.05em"}},item.l),
            React.createElement("div",{style:{fontSize:14,color:C.text,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}},item.v)
          )
        )
      )
    ))
  );
}

function HourlyDist({expressions,year}) {
  const data=useMemo(()=>expressions.filter(e=>e.parsed).map((e,i)=>{
    const times=getFireTimes(e.parsed,year,5000);const hours=new Array(24).fill(0);
    for(const t of times) hours[t.getHours()]++;
    return {hours,color:EC[i%EC.length]};
  }),[expressions,year]);
  const maxVal=Math.max(1,...data.flatMap(d=>d.hours));
  if(data.length===0) return null;

  return React.createElement("div",{style:{background:C.surfaceAlt,border:"1px solid "+C.border,borderRadius:10,padding:14}},
    React.createElement("div",{style:{fontSize:12,fontWeight:600,color:C.text,marginBottom:12}},"Hourly Distribution"),
    React.createElement("div",{style:{display:"flex",alignItems:"flex-end",gap:2,height:80}},
      Array.from({length:24},(_,h)=>{
        const total=data.reduce((s,d)=>s+d.hours[h],0);
        return React.createElement("div",{key:h,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}},
          React.createElement("div",{style:{width:"100%",position:"relative",height:total>0?Math.max(4,(total/maxVal)*64):2,display:"flex",flexDirection:"column-reverse"}},
            data.map((d,i)=>{
              const segH=d.hours[h]>0?Math.max(2,(d.hours[h]/maxVal)*64):0;
              return segH>0?React.createElement("div",{key:i,title:String(h).padStart(2,"0")+":00 \u2014 "+d.hours[h]+" runs",style:{width:"100%",height:segH,backgroundColor:d.color,opacity:0.8,borderRadius:i===data.length-1?"2px 2px 0 0":"0"}}):null;
            }),
            total===0?React.createElement("div",{style:{width:"100%",height:2,backgroundColor:C.border,borderRadius:1}}):null
          ),
          h%3===0?React.createElement("div",{style:{fontSize:8,color:C.textMuted,fontFamily:"'JetBrains Mono',monospace"}},String(h).padStart(2,"0")):null
        );
      })
    )
  );
}

function ConflictDetector({expressions,year}) {
  const conflicts=useMemo(()=>{
    const valid=expressions.filter(e=>e.parsed);if(valid.length<2) return [];
    const hits=[];
    for(let i=0;i<valid.length;i++){
      for(let j=i+1;j<valid.length;j++){
        const setA=new Set(getFireTimes(valid[i].parsed,year,2000).map(t=>t.getTime()));
        const timesB=getFireTimes(valid[j].parsed,year,2000);
        let overlap=0;for(const t of timesB) if(setA.has(t.getTime())) overlap++;
        if(overlap>0) hits.push({a:valid[i].label||valid[i].value,b:valid[j].label||valid[j].value,colorA:EC[i%EC.length],colorB:EC[j%EC.length],overlap});
      }
    }
    return hits;
  },[expressions,year]);
  if(conflicts.length===0) return null;

  return React.createElement("div",{style:{background:C.errorDim,border:"1px solid "+C.error+"33",borderRadius:10,padding:14,marginTop:12}},
    React.createElement("div",{style:{fontSize:12,fontWeight:600,color:C.error,marginBottom:8,display:"flex",alignItems:"center",gap:6}},
      React.createElement("svg",{width:14,height:14,viewBox:"0 0 24 24",fill:"none",stroke:C.error,strokeWidth:2},
        React.createElement("path",{d:"M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"}),
        React.createElement("line",{x1:12,y1:9,x2:12,y2:13}),React.createElement("line",{x1:12,y1:17,x2:12.01,y2:17})
      ),"Schedule Conflicts Detected"
    ),
    conflicts.map((c,i)=>React.createElement("div",{key:i,style:{fontSize:11,color:C.text,marginBottom:4,lineHeight:1.5}},
      React.createElement("span",{style:{color:c.colorA}},c.a)," overlaps with ",
      React.createElement("span",{style:{color:c.colorB}},c.b)," \u2014 ",
      React.createElement("span",{style:{color:C.orange,fontWeight:600}},c.overlap.toLocaleString()),
      " shared execution time"+(c.overlap!==1?"s":"")
    ))
  );
}

function App() {
  const [expressions,setExpressions]=useState([{id:1,value:"0 9 * * 1-5",label:"Weekday morning",parsed:null}]);
  const [year,setYear]=useState(new Date().getFullYear());
  const [dayDetail,setDayDetail]=useState(null);
  const [showPresets,setShowPresets]=useState(false);
  const [activePresetTarget,setActivePresetTarget]=useState(null);
  const nextId=useRef(2);

  useEffect(()=>{setExpressions(prev=>prev.map(e=>({...e,parsed:parseCron(e.value)})));},[]);

  const updateExpr=useCallback((id,value)=>{setExpressions(prev=>prev.map(e=>e.id===id?{...e,value,parsed:parseCron(value)}:e));},[]);
  const updateLabel=useCallback((id,label)=>{setExpressions(prev=>prev.map(e=>e.id===id?{...e,label}:e));},[]);
  const addExpr=useCallback(()=>{const id=nextId.current++;setExpressions(prev=>[...prev,{id,value:"",label:"",parsed:null}]);},[]);
  const removeExpr=useCallback((id)=>{setExpressions(prev=>prev.filter(e=>e.id!==id));},[]);
  const applyPreset=useCallback((preset)=>{
    if(activePresetTarget!==null) setExpressions(prev=>prev.map(e=>e.id===activePresetTarget?{...e,value:preset.expr,label:preset.label,parsed:parseCron(preset.expr)}:e));
    setShowPresets(false);setActivePresetTarget(null);
  },[activePresetTarget]);

  const nextRuns=useMemo(()=>{
    const now=new Date();const allRuns=[];
    for(let y=now.getFullYear();y<=now.getFullYear()+1;y++){
      for(let i=0;i<expressions.length;i++){
        const e=expressions[i];if(!e.parsed) continue;
        const times=getFireTimes(e.parsed,y,3000);
        for(const t of times) if(t>now) allRuns.push({time:t,expr:e,color:EC[i%EC.length]});
      }
    }
    allRuns.sort((a,b)=>a.time-b.time);return allRuns.slice(0,15);
  },[expressions]);

  const hasInvalid=expressions.some(e=>e.value.trim()!==""&&!e.parsed);

  return React.createElement("div",{style:{minHeight:"100vh",backgroundColor:C.bg,color:C.text,fontFamily:"'Inter',-apple-system,sans-serif"}},
    React.createElement("div",{style:{maxWidth:1200,margin:"0 auto",padding:"24px 20px"}},

      // Header
      React.createElement("div",{style:{marginBottom:28,display:"flex",alignItems:"baseline",gap:12,flexWrap:"wrap"}},
        React.createElement("h1",{style:{fontFamily:"'Outfit',sans-serif",fontSize:28,fontWeight:800,background:"linear-gradient(135deg,"+C.accent+","+C.purple+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"-0.02em"}},"CronScope"),
        React.createElement("span",{style:{fontSize:11,color:C.textMuted,fontFamily:"'JetBrains Mono',monospace"}},"v0.1.0"),
        React.createElement("span",{style:{fontSize:12,color:C.textDim,marginLeft:"auto"}},"Cron Expression Simulator + Calendar Visualizer")
      ),

      // Expression inputs
      React.createElement("div",{style:{marginBottom:20,display:"flex",flexDirection:"column",gap:8}},
        expressions.map((e,i)=>{
          const isValid=e.value.trim()===""||e.parsed!==null;
          return React.createElement("div",{key:e.id,style:{display:"flex",gap:8,alignItems:"center",animation:"slideIn 0.2s ease"}},
            React.createElement("span",{style:{width:10,height:10,borderRadius:"50%",background:EC[i%EC.length],flexShrink:0,boxShadow:"0 0 8px "+EC[i%EC.length]+"55"}}),
            React.createElement("input",{value:e.label,onChange:ev=>updateLabel(e.id,ev.target.value),placeholder:"Label",
              style:{width:140,padding:"8px 10px",background:C.surface,border:"1px solid "+C.border,borderRadius:8,color:C.text,fontSize:12,fontFamily:"'Inter',sans-serif"}}),

              React.createElement("input",{value:e.value,onChange:ev=>updateExpr(e.id,ev.target.value),placeholder:"* * * * *  (min hr dom mon dow)",spellCheck:false,
                style:{width:"100%",padding:"8px 12px",background:C.surface,border:"1px solid "+(isValid?C.border:C.error),borderRadius:8,color:C.text,fontSize:14,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.05em",transition:"border-color 0.15s"},
                onFocus:ev=>{ev.target.style.borderColor=isValid?C.accent:C.error;},onBlur:ev=>{ev.target.style.borderColor=isValid?C.border:C.error;}}),
              e.parsed?React.createElement("div",{style:{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:10,color:C.textMuted,maxWidth:"40%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",pointerEvents:"none"}},describeCron(e.value)):null
            ),

          React.createElement("button",{onClick:addExpr,
            style:{background:C.accentGlow,border:"1px solid "+C.accentDim,borderRadius:8,padding:"6px 14px",color:C.accent,fontSize:12,cursor:"pointer",fontWeight:500,transition:"all 0.15s"},
            onMouseEnter:ev=>{ev.currentTarget.style.background=C.accent+"33";},onMouseLeave:ev=>{ev.currentTarget.style.background=C.accentGlow;}},
            "+ Add Expression"

      // Presets modal
      showPresets?React.createElement("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,animation:"fadeIn 0.15s ease"},

        React.createElement("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:14,padding:20,width:380,animation:"slideIn 0.2s ease"},onClick:ev=>ev.stopPropagation()},
          React.createElement("div",{style:{fontSize:14,fontWeight:600,color:C.text,marginBottom:14}},"Presets"),

            PRESETS.map((p,i)=>React.createElement("button",{key:i,onClick:()=>applyPreset(p),

          onMouseEnter:ev=>{ev.currentTarget.style.borderColor=C.accent;},onMouseLeave:ev=>{ev.currentTarget.style.borderColor=C.border;}},"\u2190"),
        React.createElement("span",{style:{fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:C.text}},year),
        React.createElement("button",{onClick:()=>setYear(y=>y+1),style:{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:"4px 12px",cursor:"pointer",color:C.textDim,fontSize:14,transition:"all 0.15s"},
          onMouseEnter:ev=>{ev.currentTarget.style.borderColor=C.accent;},onMouseLeave:ev=>{ev.currentTarget.style.borderColor=C.border;}},"\u2192"),
        React.createElement("button",{onClick:()=>setYear(new Date().getFullYear()),style:{background:"none",border:"none",color:C.accent,fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}},"today")
      ),

      // Main grid
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 300px",gap:20,alignItems:"start"}},
        // Left column
        React.createElement("div",null,
          React.createElement("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:14,padding:18}},
            React.createElement("div",{style:{fontSize:12,fontWeight:600,color:C.textDim,marginBottom:12,display:"flex",gap:6,alignItems:"center"}},
              React.createElement("span",null,"EXECUTION HEATMAP"),
              React.createElement("span",{style:{fontSize:10,color:C.textMuted,fontWeight:400}},"Click a cell for details")
            ),
            React.createElement("div",{style:{display:"flex",gap:4,marginBottom:10}},
              React.createElement("div",{style:{width:40}}),
              DAYS.map(d=>React.createElement("div",{key:d,style:{fontSize:8,color:C.textMuted,width:13,textAlign:"center",fontFamily:"'JetBrains Mono',monospace"}},d[0]))
            ),
            React.createElement(CalendarHeatmap,{expressions,year,onDayClick:(y,m,d)=>setDayDetail({year:y,month:m,day:d})}),
            React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,marginTop:12,paddingLeft:40}},
              React.createElement("span",{style:{fontSize:9,color:C.textMuted}},"Less"),
              [0.1,0.3,0.5,0.7,1].map((opacity,i)=>React.createElement("div",{key:i,style:{width:10,height:10,borderRadius:2,backgroundColor:C.accent+Math.round(opacity*200).toString(16).padStart(2,"0")}})),
              React.createElement("span",{style:{fontSize:9,color:C.textMuted}},"More")
            )
          ),
          dayDetail?React.createElement(DayDetail,{year:dayDetail.year,month:dayDetail.month,day:dayDetail.day,expressions,onClose:()=>setDayDetail(null)}):null,
          React.createElement("div",{style:{marginTop:16}},React.createElement(HourlyDist,{expressions,year})),
          React.createElement(ConflictDetector,{expressions,year})
        ),

        // Right sidebar
        React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:16}},
          // Plain English
          expressions.filter(e=>e.parsed).length>0?React.createElement("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:14}},
            React.createElement("div",{style:{fontSize:11,fontWeight:600,color:C.textDim,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}},"Plain English"),
            expressions.filter(e=>e.parsed).map((e,i)=>React.createElement("div",{key:e.id,style:{fontSize:12,color:C.text,marginBottom:6,display:"flex",alignItems:"flex-start",gap:6,lineHeight:1.5}},
              React.createElement("span",{style:{width:6,height:6,borderRadius:"50%",background:EC[i%EC.length],flexShrink:0,marginTop:5}}),
              describeCron(e.value)
            ))
          ):null,

          // Next runs
          nextRuns.length>0?React.createElement("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:14}},
            React.createElement("div",{style:{fontSize:11,fontWeight:600,color:C.textDim,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}},"Next 15 Runs"),
            React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:3}},
              nextRuns.map((r,i)=>React.createElement("div",{key:i,style:{fontSize:11,display:"flex",alignItems:"center",gap:6,padding:"3px 0",fontFamily:"'JetBrains Mono',monospace",color:C.textDim}},
                React.createElement("span",{style:{width:5,height:5,borderRadius:"50%",background:r.color,flexShrink:0}}),
                React.createElement("span",{style:{color:C.text}},MONTHS[r.time.getMonth()]+" "+r.time.getDate()),
                React.createElement("span",null,String(r.time.getHours()).padStart(2,"0")+":"+String(r.time.getMinutes()).padStart(2,"0")),

              ))

          ):null,

          // Stats
          React.createElement(StatsPanel,{expressions,year})
        )
      )
    )
  );
}
